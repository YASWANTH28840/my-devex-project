version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devex-api
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    command: python -m flask run --host=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - devex

networks:
  devex:
    driver: bridge
